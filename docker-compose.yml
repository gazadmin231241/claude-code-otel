networks:
  otel-network:
    driver: bridge

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest   # ≈ 50 MB
    container_name: skill-otel-collector
    command: ["--config=/etc/otel/collector-config.yaml"]
    volumes:
      - ./collector-config.yaml:/etc/otel/collector-config.yaml:ro
    ports:
      - "4317:4317"      # OTLP gRPC in
      - "4318:4318"      # OTLP HTTP  in
      - "8889:8889"      # Prometheus scrape out
    restart: unless-stopped
    networks:
      - otel-network

  prometheus:
    image: prom/prometheus:latest
    container_name: skill-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on: [otel-collector]
    networks:
      - otel-network

  loki:
    image: grafana/loki:latest
    container_name: skill-loki
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - otel-network

  grafana:
    image: grafana/grafana-oss:latest
    container_name: skill-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=logsSampleInExplore
    volumes:
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./ai-code-observability-dashboard.json:/var/lib/grafana/dashboards/ai-code-observability-dashboard.json:ro
      - ./claude-code-dashboard.json:/var/lib/grafana/dashboards/claude-code-dashboard.json:ro
      - ./skill-usage-dashboard.json:/var/lib/grafana/dashboards/skill-usage-dashboard.json:ro
      - ./codex-observability-dashboard.json:/var/lib/grafana/dashboards/codex-observability-dashboard.json:ro
    ports:
      - "13737:3000"
    restart: unless-stopped
    depends_on: [prometheus, loki]
    networks:
      - otel-network

  codex-skill-bridge:
    image: node:22-alpine
    container_name: codex-skill-bridge
    command: ["node", "/app/codex-skill-bridge.mjs"]
    environment:
      LOKI_PUSH_ENDPOINT: "http://loki:3100/loki/api/v1/push"
      CODEX_HISTORY_PATH: "/codex/history.jsonl"
      CODEX_SESSIONS_PATH: "/codex/sessions"
      CODEX_ARCHIVED_SESSIONS_PATH: "/codex/archived_sessions"
      CODEX_METRICS_PORT: "9464"
      CODEX_METRICS_REFRESH_MS: "30000"
      CLAUDE_PROJECTS_PATH: "/claude/projects"
      CODEX_BRIDGE_STATE_PATH: "/data/codex-skill-bridge-state.json"
      CODEX_BRIDGE_POLL_INTERVAL_MS: "5000"
      CODEX_BRIDGE_HISTORY_WINDOW_DAYS: "30"
    volumes:
      - ./scripts/codex-skill-bridge.mjs:/app/codex-skill-bridge.mjs:ro
      - ./scripts/codex-observability.mjs:/app/codex-observability.mjs:ro
      - /home/admin/.codex/history.jsonl:/codex/history.jsonl:ro
      - /home/admin/.codex/sessions:/codex/sessions:ro
      - /home/admin/.claude/projects:/claude/projects:ro
      - ./data:/data
    ports:
      - "9464:9464"
    restart: unless-stopped
    depends_on: [loki]
    networks:
      - otel-network
